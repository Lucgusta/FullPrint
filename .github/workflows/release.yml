name: Release

# Dispara ao criar uma tag de versao, ex.: git tag v1.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # necessario para publicar o asset no Release

env:
  # Forca actions JS legadas (ex.: action-gh-release) a rodar em Node 24,
  # silenciando o aviso de deprecacao do Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Derivar versao da tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Versao: $v"

      - name: Injetar versao em src/version.py
        shell: pwsh
        run: |
          Set-Content -Path src/version.py -Value "__version__ = `"$env:APP_VERSION`"" -Encoding utf8

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build do executavel (PyInstaller)
        run: pyinstaller packaging/FullPrint.spec --noconfirm

      - name: Preparar Tesseract embutido (binario + idioma por)
        shell: pwsh
        run: |
          choco install tesseract --no-progress -y
          $tess = "C:\Program Files\Tesseract-OCR"
          Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/por.traineddata" -OutFile "$tess\tessdata\por.traineddata"
          New-Item -ItemType Directory -Force -Path packaging\tesseract | Out-Null
          Copy-Item "$tess\*" packaging\tesseract -Recurse -Force

      - name: Compilar instalador (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$env:APP_VERSION" packaging\installer.iss

      - name: Publicar instalador no Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist_installer/FullPrintSetup.exe
          fail_on_unmatched_files: true
