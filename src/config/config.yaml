app:
  name: "Shopee ZPL Spooler"
  theme: "dark"
  color_theme: "blue"

printer:
  default_name: ""
  encoding: "utf-8"
  chunk_size: 50
  dev_mode: false
  dev_output_dir: "data/dev_output"

paths:
  default_input_dir: "~/Downloads"
  logs_dir: "logs"

logging:
  level: "INFO"
  max_bytes: 1048576
  backup_count: 5
